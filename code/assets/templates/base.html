{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren Sound Detection</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding-top: 80px; }

        /* ── NAVBAR ── */
        .main-navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
            height: 80px; display: flex; align-items: center;
        }
        .main-navbar .nav-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            width: 100%; display: flex; align-items: center; justify-content: space-between;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; font-weight: 800; font-size: 1.25rem;
        }
        .nav-brand .brand-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }
        .nav-brand .brand-icon svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2.5; }
        .nav-brand .brand-teal { color: #10b981; }
        .nav-brand .brand-dark { color: #0f172a; }

        .nav-links { display: flex; align-items: center; gap: 8px; }
        .nav-link-item {
            text-decoration: none; padding: 10px 18px; border-radius: 10px;
            font-size: 0.95rem; font-weight: 600; color: #475569;
            transition: all 0.2s ease;
        }
        .nav-link-item:hover { color: #1e293b; background: #f1f5f9; }
        .nav-link-item.btn-primary {
            background: #10b981; color: #fff !important; margin-left: 8px;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }
        .nav-link-item.btn-primary:hover { background: #059669; transform: translateY(-1px); }

        /* ── FOOTER ── */
        footer {
            background: #0f172a; color: white; padding: 40px 0; margin-top: 80px;
        }
        .footer-content {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .footer-logo { font-weight: 700; font-size: 1.1rem; opacity: 0.8; }
        .footer-copyright { font-size: 0.9rem; opacity: 0.6; }

        /* ── ALERTS ── */
        .messages-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: fixed; top: 90px; left: 0; right: 0; z-index: 1001; }
        .alert { border-radius: 12px; border: none; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

<nav class="main-navbar">
    <div class="nav-inner">
        <a class="nav-brand" href="{% url 'index' %}">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 5.5 5 9c0 5 7 13 7 13s7-8 7-13c0-3.5-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            </div>
            <span><span class="brand-teal">Siren Sound</span> <span class="brand-dark">Detection</span></span>
        </a>
        <div class="nav-links">
            <a href="{% url 'index' %}" class="nav-link-item">Home</a>
            <a href="{% url 'UserLogin' %}" class="nav-link-item">User</a>
            <a href="{% url 'AdminLogin' %}" class="nav-link-item">Admin</a>
            <a href="{% url 'UserRegister' %}" class="nav-link-item btn-primary">Registration</a>
        </div>
    </div>
</nav>

{% if messages %}
<div class="messages-container">
    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>
    {% endfor %}
</div>
{% endif %}

{% block contents %}{% endblock %}

<footer>
    <div class="footer-content">
        <div class="footer-logo">Siren Sound Detection</div>
        <div class="footer-copyright">&copy; <span id="year"></span> Emergency Vehicle Classification System</div>
    </div>
</footer>

<script src="{% static 'js/jquery-3.5.1.min.js' %}"></script>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
