{% extends 'base.html' %}
{% load static %}

{% block contents %}
<style>
    .auth-section {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        background: #f8fafc;
    }
    .auth-card {
        background: white;
        padding: 48px;
        width: 100%;
        max-width: 480px;
        border-radius: 20px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        border: 1px solid #e2e8f0;
    }
    .auth-header {
        text-align: center;
        margin-bottom: 32px;
    }
    .auth-header h2 {
        font-size: 2rem;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 8px;
    }
    .auth-header p {
        color: #64748b;
        font-weight: 500;
    }
    .form-group {
        margin-bottom: 24px;
        position: relative;
    }
    .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #475569;
        margin-bottom: 8px;
    }
    .form-input {
        width: 100%;
        padding: 12px 16px;
        background: #f1f5f9;
        border: 2px solid transparent;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 500;
        color: #1e293b;
        transition: all 0.2s;
    }
    .form-input:focus {
        background: white;
        border-color: #10b981;
        outline: none;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }
    .btn-submit {
        width: 100%;
        padding: 14px;
        background: #10b981;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
    }
    .btn-submit:hover {
        background: #059669;
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
    }
    .auth-footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid #f1f5f9;
    }
    .auth-footer a {
        color: #10b981;
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <h2>User Login</h2>
            <p>Enter your credentials to access your dashboard</p>
        </div>

        <form action="{% url 'UserLoginCheck' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="loginid">Login ID</label>
                <input class="form-input" type="text" id="loginid" name="loginid" placeholder="Your username" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="pswd">Password</label>
                <input class="form-input" type="password" id="pswd" name="pswd" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'UserRegister' %}">Create account</a>
        </div>
    </div>
</div>
{% endblock %}
