{% extends 'base.html' %}
{% load static %}

{% block contents %}
<style>
    .auth-section {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        background: radial-gradient(circle at top right, #f8fafc 0%, #f1f5f9 100%);
    }
    .auth-card {
        background: white;
        padding: 48px;
        width: 100%;
        max-width: 480px;
        border-radius: 24px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        border: 1px solid #e2e8f0;
        position: relative;
    }
    .auth-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 6px;
        background: linear-gradient(90deg, #1e293b, #334155);
        border-radius: 24px 24px 0 0;
    }
    .auth-header {
        text-align: center;
        margin-bottom: 32px;
    }
    .auth-header h2 {
        font-size: 2rem;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 8px;
    }
    .auth-header p {
        color: #475569;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
    }
    .form-group {
        margin-bottom: 24px;
    }
    .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 8px;
    }
    .form-input {
        width: 100%;
        padding: 12px 16px;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 500;
        color: #1e293b;
        transition: all 0.2s;
    }
    .form-input:focus {
        background: white;
        border-color: #334155;
        outline: none;
        box-shadow: 0 0 0 4px rgba(51, 65, 85, 0.1);
    }
    .btn-submit {
        width: 100%;
        padding: 14px;
        background: #0f172a;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-submit:hover {
        background: #1e293b;
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }
</style>

<div class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Admin Login</h2>
            <p>Access control panel</p>
        </div>

        <form action="{% url 'AdminLoginCheck' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="loginid">Login ID</label>
                <input class="form-input" type="text" id="loginid" name="loginid" placeholder="Admin username" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="pswd">Password</label>
                <input class="form-input" type="password" id="pswd" name="pswd" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
