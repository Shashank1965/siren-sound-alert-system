{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren Sound Detection</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding-top: 68px; }

        /* ── NAVBAR ── */
        .user-navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: #ffffff;
            border-bottom: 1px solid #e8ecf0;
            box-shadow: 0 1px 8px rgba(0,0,0,0.08);
            height: 68px; display: flex; align-items: center;
        }
        .user-navbar .nav-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            width: 100%; display: flex; align-items: center; justify-content: space-between;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; font-weight: 800; font-size: 1.2rem;
        }
        .nav-brand .brand-icon {
            width: 36px; height: 36px; background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .nav-brand .brand-icon svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2; }
        .nav-brand .brand-teal { color: #10b981; }
        .nav-brand .brand-dark { color: #1e293b; }

        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-link-item {
            text-decoration: none; padding: 8px 16px; border-radius: 8px;
            font-size: 0.9rem; font-weight: 500; color: #64748b;
            transition: all 0.15s ease;
        }
        .nav-link-item:hover { color: #1e293b; background: #f8fafc; }
        .nav-link-item.active {
            background: #10b981; color: #fff !important; font-weight: 600;
        }
        .nav-link-item.active:hover { background: #059669; }
        .nav-logout {
            text-decoration: none; padding: 7px 18px; border-radius: 8px;
            font-size: 0.9rem; font-weight: 600; color: #374151;
            border: 1.5px solid #d1d5db; margin-left: 8px;
            transition: all 0.15s ease;
        }
        .nav-logout:hover { border-color: #9ca3af; background: #f9fafb; color: #111; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="user-navbar">
    <div class="nav-inner">
        <a class="nav-brand" href="{% url 'UserHome' %}">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 5.5 5 9c0 5 7 13 7 13s7-8 7-13c0-3.5-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            </div>
            <span><span class="brand-teal">Siren Sound</span> <span class="brand-dark">Detection</span></span>
        </a>
        <div class="nav-links">
            <a href="{% url 'UserHome' %}" class="nav-link-item {% block nav_home %}{% endblock %}">Home</a>
            <a href="{% url 'training' %}" class="nav-link-item {% block nav_training %}{% endblock %}">Training</a>
            <a href="{% url 'predict_audio' %}" class="nav-link-item {% block nav_predict %}{% endblock %}">Predict Audio</a>
            <a href="{% url 'index' %}" class="nav-logout">Logout</a>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<script src="{% static 'js/jquery-3.5.1.min.js' %}"></script>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
